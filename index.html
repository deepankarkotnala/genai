<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GenAI Learning Hub</title>
<!-- Redirect to the hub. Works on GitHub Pages (repo root) and locally. -->
<meta http-equiv="refresh" content="0; url=genai-portal/index.html">
<link rel="canonical" href="genai-portal/index.html">
<style>
  html,body{height:100%;margin:0}
  body{
    display:flex;align-items:center;justify-content:center;
    background:#ffffff;color:#1d1d1f;
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .box{text-align:center;padding:24px}
  .mk{
    width:56px;height:56px;border-radius:14px;margin:0 auto 18px;
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:26px;
    background:linear-gradient(135deg,#6e56cf,#0071e3);
    box-shadow:0 10px 30px -10px rgba(110,86,207,.6);
  }
  h1{font-size:18px;font-weight:700;letter-spacing:-.01em;margin:0 0 6px}
  p{color:#6e6e73;font-size:14px;margin:0 0 18px}
  a{color:#0066cc;text-decoration:none;font-weight:600}
  a:hover{text-decoration:underline}
  .spin{
    width:22px;height:22px;margin:0 auto;border-radius:50%;
    border:3px solid #e3e3e8;border-top-color:#6e56cf;
    animation:s .8s linear infinite;
  }
  @keyframes s{to{transform:rotate(360deg)}}
  @media(prefers-color-scheme:dark){
    body{background:#1a1a1f;color:#ececec}
    p{color:#84848e}
    .spin{border-color:#2c2c34;border-top-color:#8a72e6}
  }
</style>
</head>
<body>
  <div class="box">
    <div class="mk">G</div>
    <h1>GenAI Learning Hub</h1>
    <p>Taking you to the hub…</p>
    <div class="spin" aria-hidden="true"></div>
    <p style="margin-top:18px">Not redirected? <a href="genai-portal/index.html">Open the hub →</a></p>
  </div>
  <script>
    // Robust fallback in case meta-refresh is blocked; preserve any #hash deep-link.
    location.replace("genai-portal/index.html" + (location.hash || ""));
  </script>
</body>
</html>
